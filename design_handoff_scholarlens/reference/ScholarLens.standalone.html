document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fdiv>\n    <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(150,170,205,0.6);\">PAPERS<\u002Fdiv><div data-stat=\"papers\" style=\"margin-top:3px; font-size:28px; font-weight:300; color:#eaf0fb; font-variant-numeric:tabular-nums;\">0<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(255,120,120,0.7);\">CONTRADICTIONS<\u002Fdiv><div data-stat=\"contra\" style=\"margin-top:3px; font-size:28px; font-weight:300; color:#ff8a8a; font-variant-numeric:tabular-nums;\">0<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- hypothesis callout -->\n  <div data-hyp=\"wrap\" style=\"position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:5; pointer-events:none; opacity:0;\">\n    <div style=\"position:relative; width:min(86vw,640px); text-align:center;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:5px; color:rgba(53,208,192,0.95); margin-bottom:16px;\">06 / HYPOTHESIS<\u002Fdiv>\n      <div style=\"font-weight:300; font-size:clamp(28px,4.6vw,58px); line-height:1.08; letter-spacing:-0.015em; color:#eef2fa;\">A research gap becomes a hypothesis.<\u002Fdiv>\n      <div style=\"margin:26px auto 0; width:min(82vw,460px); padding:14px 16px; border:1px solid rgba(53,208,192,0.5); border-radius:10px; background:linear-gradient(180deg,rgba(10,30,30,0.78),rgba(6,18,18,0.85)); box-shadow:0 0 40px rgba(53,208,192,0.18), 0 14px 40px rgba(0,0,0,0.5); text-align:left;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:8.5px; letter-spacing:2px; color:rgba(53,208,192,0.95);\">GENERATED HYPOTHESIS · H-0427<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:13.5px; line-height:1.4; color:#def4f0;\">Coaching gains may reverse under adversarial counterparts — untested across the field.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- feature markers (interactive) -->\n  <div data-markers=\"layer\" style=\"position:fixed; inset:0; z-index:7; pointer-events:none;\"><\u002Fdiv>\n  <div data-tip=\"box\" style=\"position:fixed; left:0; top:0; z-index:9; pointer-events:none; opacity:0; transform:translate(-9999px,-9999px); width:240px; padding:12px 13px; border:1px solid rgba(140,165,210,0.3); border-radius:10px; background:linear-gradient(180deg,rgba(12,16,28,0.94),rgba(8,11,20,0.96)); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); box-shadow:0 16px 44px rgba(0,0,0,0.55);\">\n    <div data-tip=\"kind\" style=\"font-family:'IBM Plex Mono',monospace; font-size:8px; letter-spacing:2px; color:rgba(180,200,235,0.8);\">CLAIM<\u002Fdiv>\n    <div data-tip=\"text\" style=\"margin-top:6px; font-size:12.5px; line-height:1.4; color:#eef2fa;\"><\u002Fdiv>\n    <div data-tip=\"meta\" style=\"margin-top:9px; display:flex; flex-wrap:wrap; gap:5px;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- evidence chamber -->\n  <div data-chamber=\"overlay\" style=\"position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; padding:4vh 3vw; opacity:0; pointer-events:none; background:rgba(3,4,9,0.6); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); transition:opacity .35s ease;\">\n    <div data-chamber=\"card\" style=\"width:min(96vw,1040px); max-height:90vh; overflow:auto; border:1px solid rgba(255,90,90,0.28); border-radius:16px; background:linear-gradient(180deg,rgba(12,14,22,0.96),rgba(8,9,16,0.98)); box-shadow:0 50px 130px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05); transform:scale(0.95); transition:transform .35s cubic-bezier(.2,.8,.2,1);\">\n      <div style=\"display:flex; align-items:center; gap:12px; padding:18px 22px; border-bottom:1px solid rgba(255,90,90,0.16);\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#ff5b5b;box-shadow:0 0 10px #ff5b5b;\"><\u002Fspan>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:4px; color:rgba(255,150,150,0.85);\">EVIDENCE CHAMBER · WHY FINDINGS DISAGREE<\u002Fdiv>\n        <div data-chamber=\"close\" style=\"margin-left:auto; pointer-events:auto; cursor:none; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(160,180,215,0.25); border-radius:8px; color:rgba(200,215,240,0.8); font-size:15px;\">✕<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:22px;\">\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n          <div style=\"padding:16px; border:1px solid rgba(220,228,245,0.18); border-radius:12px; background:rgba(220,228,245,0.03);\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(220,228,245,0.7);\">CLAIM A<\u002Fdiv>\n            <div style=\"margin-top:8px; font-size:16px; font-weight:500; line-height:1.32; color:#eef2fa;\">Coaching gains persist after four weeks.<\u002Fdiv>\n            <div style=\"margin-top:10px; font-size:11.5px; color:rgba(190,205,232,0.72); line-height:1.5;\">Durable Effects of AI Negotiation Coaching<\u002Fdiv>\n            <div style=\"margin-top:12px; display:flex; flex-wrap:wrap; gap:6px;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:rgba(200,216,242,0.8); border:1px solid rgba(160,180,215,0.22); border-radius:6px; padding:3px 7px;\">LONGITUDINAL RCT<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:rgba(200,216,242,0.8); border:1px solid rgba(160,180,215,0.22); border-radius:6px; padding:3px 7px;\">n = 180<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:rgba(200,216,242,0.8); border:1px solid rgba(160,180,215,0.22); border-radius:6px; padding:3px 7px;\">conf 0.74<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px; border:1px solid rgba(255,120,120,0.25); border-radius:12px; background:rgba(255,80,80,0.04);\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(255,150,150,0.85);\">CLAIM B<\u002Fdiv>\n            <div style=\"margin-top:8px; font-size:16px; font-weight:500; line-height:1.32; color:#fbeeee;\">Coaching gains decay within two weeks.<\u002Fdiv>\n            <div style=\"margin-top:10px; font-size:11.5px; color:rgba(232,200,205,0.72); line-height:1.5;\">Short-Horizon Replication of Coaching Effects<\u002Fdiv>\n            <div style=\"margin-top:12px; display:flex; flex-wrap:wrap; gap:6px;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:rgba(255,190,190,0.85); border:1px solid rgba(255,120,120,0.28); border-radius:6px; padding:3px 7px;\">REPLICATION<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:rgba(255,190,190,0.85); border:1px solid rgba(255,120,120,0.28); border-radius:6px; padding:3px 7px;\">n = 210<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:rgba(255,190,190,0.85); border:1px solid rgba(255,120,120,0.28); border-radius:6px; padding:3px 7px;\">conf 0.81<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px; display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(53,208,192,0.85);\">SHARED CONCEPTS<\u002Fdiv>\n            <div style=\"margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;\">\n              <span style=\"font-size:11.5px; color:rgba(210,224,244,0.82); border:1px solid rgba(53,208,192,0.22); border-radius:999px; padding:4px 10px;\">skill retention<\u002Fspan>\n              <span style=\"font-size:11.5px; color:rgba(210,224,244,0.82); border:1px solid rgba(53,208,192,0.22); border-radius:999px; padding:4px 10px;\">novice cohort<\u002Fspan>\n              <span style=\"font-size:11.5px; color:rgba(210,224,244,0.82); border:1px solid rgba(53,208,192,0.22); border-radius:999px; padding:4px 10px;\">coaching dosage<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(200,164,90,0.85);\">METHODOLOGICAL DIFFERENCE<\u002Fdiv>\n            <div style=\"margin-top:8px; font-size:12px; line-height:1.5; color:rgba(210,222,242,0.82);\">Follow-up window of 4 weeks vs 2 weeks; spaced reminder prompts present in A, absent in B.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px; padding:14px 16px; border:1px solid rgba(159,180,216,0.22); border-radius:12px; background:rgba(159,180,216,0.04);\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(159,180,216,0.85);\">POSSIBLE EXPLANATIONS<\u002Fdiv>\n          <div style=\"margin-top:8px; font-size:12.5px; line-height:1.55; color:rgba(214,224,244,0.85);\">Spaced reinforcement in A may sustain gains · cohort experience differs · measurement timing relative to last session is not aligned across studies.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; gap:14px; align-items:stretch; flex-wrap:wrap;\">\n          <div style=\"flex:1; min-width:240px; padding:14px 16px; border:1px solid rgba(53,208,192,0.4); border-radius:12px; background:rgba(53,208,192,0.05);\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:3px; color:rgba(53,208,192,0.9);\">RESEARCH GAP → HYPOTHESIS<\u002Fdiv>\n            <div style=\"margin-top:8px; font-size:13px; line-height:1.5; color:#def4f0;\">Durability under realistic <strong style=\"color:#7ff0df; font-weight:600;\">adversarial counterparts<\u002Fstrong> is untested. S seed[i]; x+=Math.sin(t*0.6+s)*0.8; y+=Math.cos(t*0.5+s*1.3)*0.8; zz+=Math.sin(t*0.4+s*0.7)*0.8;\n      if (contra[i] && tension>0.01){ const cc=centers[cidx[i]]; const dx=x-cc[0],dy=y-cc[1],dz=zz-cc[2],d=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001,push=tension*16;\n        x+=(dx/d)*push+Math.sin(t*7+s)*tension*4; y+=(dy/d)*push+Math.cos(t*8+s)*tension*4; zz+=(dz/d)*push+Math.sin(t*6+s*2)*tension*4; }\n      pos[i*3]=x;pos[i*3+1]=y;pos[i*3+2]=zz;\n      let a=this.smooth(birth[i],birth[i]+0.12,appear); if(contra[i]) a*=(0.7+tension*0.6); al[i]=Math.min(1,a)*0.95;\n    }\n    al[0]=(1-this.smooth(0.06,0.18,p))*0.95;\n    const hypA=this.smooth(0.70,0.78,p); al[1]=hypA*(0.75+0.25*Math.sin(t*3));\n    this.posAttr.needsUpdate=true; this.alphaAttr.needsUpdate=true;\n\n    const {E,pairs,types,epos,ecol,ealpha}=this.EE;\n    const edgeBase=this.smooth(0.18,0.32,p);\n    for (let e=0;e<E;e++){ const a=pairs[e*2],b=pairs[e*2+1];\n      epos[e*6]=pos[a*3];epos[e*6+1]=pos[a*3+1];epos[e*6+2]=pos[a*3+2];\n      epos[e*6+3]=pos[b*3];epos[e*6+4]=pos[b*3+1];epos[e*6+5]=pos[b*3+2];\n      let cr,cg,cb,ea;\n      if (types[e]===1){ cr=1.0;cg=0.27;cb=0.27; ea=edgeBase*(0.12+tension*0.85); }\n      else { cr=0.82;cg=0.64;cb=0.36; ea=edgeBase*0.14*Math.min(al[a],al[b]); }\n      ecol[e*6]=cr;ecol[e*6+1]=cg;ecol[e*6+2]=cb;ecol[e*6+3]=cr;ecol[e*6+4]=cg;ecol[e*6+5]=cb;\n      ealpha[e*2]=ea;ealpha[e*2+1]=ea;\n    }\n    this.EE.geo.attributes.position.needsUpdate=true; this.EE.geo.attributes.aColor.needsUpdate=true; this.EE.geo.attributes.aAlpha.needsUpdate=true;\n\n    // feature markers projection\n    this.group.updateMatrixWorld();\n    const markerVis = this.smooth(0.42,0.55,p) * (1-this.smooth(0.83,0.9,p));\n    const interactive = markerVis>0.4 && !this.chamberOpen;\n    let tipShown=false;\n    for (let i=0;i<this.F.length;i++){\n      const f=this.F[i], el=this.markers[i];\n      let vis=markerVis;\n      if (f.hyp) vis*=this.smooth(0.70,0.78,p);\n      const bx=f.x+Math.sin(t*0.5+i)*0.6
